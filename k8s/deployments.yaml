apiVersion: v1
kind: ConfigMap
metadata:
  name: codegladiator-config
  namespace: codegladiator
data:
  AWS_REGION: "us-east-1"
  S3_BUCKET: "codegladiator-submissions"
  FRONTEND_ORIGIN: "https://codegladiator.com"
  LOG_LEVEL: "info"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: codegladiator
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ECR_REGISTRY/codegladiator-api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: codegladiator-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: codegladiator-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: codegladiator-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: codegladiator-secrets
                  key: REDIS_URL
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: codegladiator
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 4000
      protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: codegladiator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-server
  namespace: codegladiator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ws-server
  template:
    metadata:
      labels:
        app: ws-server
    spec:
      containers:
        - name: ws-server
          image: ECR_REGISTRY/codegladiator-ws-server:latest
          ports:
            - containerPort: 4001
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: codegladiator-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: codegladiator-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: ws-server
  namespace: codegladiator
spec:
  type: LoadBalancer
  selector:
    app: ws-server
  sessionAffinity: ClientIP
  ports:
    - port: 80
      targetPort: 4001
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-runner
  namespace: codegladiator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-runner
  template:
    metadata:
      labels:
        app: sandbox-runner
    spec:
      containers:
        - name: sandbox-runner
          image: ECR_REGISTRY/codegladiator-sandbox-runner:latest
          ports:
            - containerPort: 3001
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
          envFrom:
            - configMapRef:
                name: codegladiator-config
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock

---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-runner
  namespace: codegladiator
spec:
  type: ClusterIP
  selector:
    app: sandbox-runner
  ports:
    - port: 3001
      targetPort: 3001

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: codegladiator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ECR_REGISTRY/codegladiator-frontend:latest
          ports:
            - containerPort: 5173
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: codegladiator
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 5173
